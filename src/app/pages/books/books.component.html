<input
  type="text"
  [(ngModel)]="search"
  (input)="onSearch()"
  placeholder="Search by title"
/>

<table tuiTable [columns]="columns" [tuiSortBy]="currentSorter" (tuiSortByChange)="onSorterChange($event)" (directionChange)="onDirectionChange($event)">
    <tr tuiThGroup>
      <th *tuiHead="'title'" tuiTh [tuiSortable]="true">Title</th>
      <th *tuiHead="'releaseDate'" tuiTh [tuiSortable]="true">Release date</th>
      <th *tuiHead="'pages'" tuiTh [tuiSortable]="true">Pages</th>
      <th *tuiHead="'description'" tuiTh [tuiSortable]="false">Description</th>
    </tr>
  <thead>
  <tbody tuiTbody [data]="filteredBooks">
    <tr tuiTr *ngFor="let book of filteredBooks">
      <td *tuiCell="'title'" tuiTd>{{ book.title }}</td>
      <td *tuiCell="'releaseDate'" tuiTd>{{ book.releaseDate }}</td>
      <td *tuiCell="'pages'" tuiTd>{{ book.pages }}</td>
      <td *tuiCell="'description'" tuiTd>{{ book.description }}</td>
    </tr>
  </tbody>
</table>
